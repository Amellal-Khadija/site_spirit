---
deployment:
  tasks:
    - echo "=== [1/4] Installation des dependances ==="
    - '. /home/spiriten/.nvm/nvm.sh 2>/dev/null; cd /home/spiriten/SPIRIT_ENGINEERING && npm install --legacy-peer-deps --no-audit --no-fund'
    - echo "=== [2/4] Build Next.js ==="
    - '. /home/spiriten/.nvm/nvm.sh 2>/dev/null; cd /home/spiriten/SPIRIT_ENGINEERING && npm run build'
    - echo "=== [3/4] Verification out/ ==="
    - ls -la /home/spiriten/SPIRIT_ENGINEERING/out/
    - echo "=== [4/4] Deploiement vers public_html ==="
    - /bin/find /home/spiriten/public_html -mindepth 1 -not -name ".htaccess" -delete
    - /bin/cp -rp /home/spiriten/SPIRIT_ENGINEERING/out/. /home/spiriten/public_html/
    - echo "Fichiers deployes :"
    - ls /home/spiriten/public_html/
    - echo "=== DONE ==="
